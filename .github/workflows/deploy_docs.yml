name: Deploy BobDocs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Copy dist
        run: |
          Remove-Item -Recurse -Force dist -ErrorAction Ignore
          Copy-Item -Recurse docs/.vitepress/dist dist

      - name: Restart container
        run: |
          docker rm -f bobdocs 2>$null
          docker run -d `
            --name bobdocs `
            -p 3000:80 `
            -v ${PWD}/dist:/usr/share/nginx/html:ro `
            -v ${PWD}/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro `
            --restart unless-stopped `
            nginx:latest
